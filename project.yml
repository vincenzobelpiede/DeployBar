name: DeployBar
options:
  bundleIdPrefix: com.salesforza
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: PH63999XMX
    CODE_SIGN_STYLE: Automatic
targets:
  DeployBar:
    type: application
    platform: macOS
    sources:
      - path: DeployBar
    info:
      path: DeployBar/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: DeployBar
        CFBundleDisplayName: DeployBar
        NSHumanReadableCopyright: "© 2026 Salesforza"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salesforza.deploybar
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ARCHS: "$(ARCHS_STANDARD)"
