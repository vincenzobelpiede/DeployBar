name: DeployBar
options:
  bundleIdPrefix: com.salesforza
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: PH63999XMX
    CODE_SIGN_STYLE: Automatic
targets:
  DeployBar:
    type: application
    platform: macOS
    sources:
      - path: DeployBar
    dependencies:
      - package: Sparkle
    info:
      path: DeployBar/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: DeployBar
        CFBundleDisplayName: DeployBar
        NSHumanReadableCopyright: "© 2026 Salesforza"
        SUFeedURL: "https://raw.githubusercontent.com/vincenzobelpiede/deploybar-releases/main/appcast.xml"
        SUPublicEDKey: "t93XWX59VMcczcXOsyrANiaxvDkIaghjG2t4Q0Dxn6A="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    entitlements:
      path: DeployBar/DeployBar.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salesforza.deploybar
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ARCHS: "$(ARCHS_STANDARD)"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DeployBar/DeployBar.entitlements
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application: Vincenzo Belpiede (PH63999XMX)"
          DEVELOPMENT_TEAM: PH63999XMX
          OTHER_CODE_SIGN_FLAGS: "--timestamp --options runtime"
